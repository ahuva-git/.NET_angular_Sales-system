<div class="profile-container">
  <h3>My Profile</h3>
  
  @if(errorMsg){
    <div class="error-message">{{errorMsg}}</div>
  }
  
  @if(successMsg){
    <div class="success-message">{{successMsg}}</div>
  }
  
  @if(userId > 0) {
    @if(!isEditing) {
      <div class="profile-display">
        <div class="info-row">
          <label>Username: </label>
          <span> {{userName}}</span>
        </div>
        <div class="info-row">
          <label>Email: </label>
          <span> {{userEmail}}</span>
        </div>
        <div class="info-row">
          <label>Phone: </label>
          <span> {{phone}}</span>
        </div>
        <button type="button" (click)="isEditing = true" class="btn-edit">Update details</button>
      </div>
    } @else {
      <form (ngSubmit)="updateProfile()" #profileForm="ngForm">
        <div class="form-group">
          <label>Username: </label>
          <input type="text" [(ngModel)]="userName" name="userName" required>
        </div>
        
        <div class="form-group">
          <label>Email: </label>
          <input type="email" [(ngModel)]="userEmail" name="email" required>
        </div>
        
        <div class="form-group">
          <label>Phone: </label>
          <input type="tel" [(ngModel)]="phone" name="phone" required>
        </div>

        <div class="form-group">
          <label>New Password (Optional):</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword">
        </div>
        
        <div class="form-group">
          <label>Confirm Password (Optional):</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword">
        </div>
        
        <div class="form-actions">
          <button type="submit" [disabled]="!profileForm.valid" class="btn-submit">Save Changes</button>
          <button type="button" (click)="cancelEdit()" class="btn-cancel">Cancel</button>
        </div>
      </form>
    }
  }
</div>
